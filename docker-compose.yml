# Timeweb Cloud Apps — Docker Compose deployment
# Redeploy trigger: 2026-06-06

services:
  # ---------------------------------------------------------------
  # Edge-прокси. Точка входа. Остаётся живым во время деплоя app
  # и автоматически показывает /maintenance.html при недоступности.
  # ---------------------------------------------------------------
  edge:
    build:
      context: ./edge
      dockerfile: Dockerfile
    ports:
      - "8082:8080"
    depends_on:
      - app
    restart: unless-stopped

  # ---------------------------------------------------------------
  # Основное приложение (SPA + reverse-proxy на Supabase).
  # Порт наружу НЕ публикуется — доступ только через edge.
  # ---------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY}
        VITE_SUPABASE_PROJECT_ID: ${VITE_SUPABASE_PROJECT_ID}
    expose:
      - "8080"
    restart: unless-stopped
