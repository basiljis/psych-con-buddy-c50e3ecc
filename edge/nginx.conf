# =====================================================================
# Edge-прокси перед основным приложением.
# Назначение:
#   1. Является постоянной точкой входа (порт 8082 на хосте).
#   2. Проксирует трафик в контейнер `app` (внутренний порт 8080).
#   3. Если апстрим недоступен (деплой, перезапуск, OOM) — автоматически
#      показывает /maintenance.html со статусом 503. Никаких ручных
#      действий не нужно.
#   4. Поддерживает ручное включение через файл-флаг
#      /etc/nginx/flags/maintenance.enabled (см. docker-compose).
# =====================================================================

resolver 127.0.0.11 ipv6=off valid=10s;   # Docker DNS, чтобы переживать пересоздание app
resolver_timeout 5s;

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream app_upstream {
    # keepalive ускоряет последовательные запросы
    server app:8080 max_fails=2 fail_timeout=5s;
    keepalive 32;
}

server {
    listen 8080 default_server;
    server_name _;

    # Заглушка лежит здесь (volume / COPY в Dockerfile edge)
    root /usr/share/nginx/html;

    # ------------------------------------------------------------------
    # Ручной режим обслуживания (опционально)
    # touch /etc/nginx/flags/maintenance.enabled в контейнере edge
    # ------------------------------------------------------------------
    set $force_maintenance 0;
    if (-f /etc/nginx/flags/maintenance.enabled) {
        set $force_maintenance 1;
    }
    if ($arg_bypass_maintenance = "1") {
        set $force_maintenance 0;
    }

    # Размер загрузок (storage, документы)
    client_max_body_size 50m;

    # Таймауты — короткие до апстрима, чтобы быстро переключаться на заглушку
    proxy_connect_timeout 3s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    # Health-check для самого edge
    location = /__edge_health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Сама страница заглушки — всегда доступна напрямую
    location = /maintenance.html {
        internal;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Retry-After "900" always;
    }

    # ------------------------------------------------------------------
    # Основной location: либо проксируем, либо показываем заглушку
    # ------------------------------------------------------------------
    location / {
        if ($force_maintenance = 1) {
            return 503;
        }

        proxy_pass http://app_upstream;

        # Переключаемся на следующий апстрим (а по сути — на error_page 502/503/504)
        # при любых сетевых ошибках или 5xx от приложения.
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
        proxy_next_upstream_timeout 5s;

        # Стандартные прокси-заголовки
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_set_header Connection        "";

        # При любой ошибке апстрима — отдаём заглушку
        proxy_intercept_errors on;
        error_page 502 503 504 = @maintenance;
    }

    # Куда уходит трафик, если приложение не отвечает
    location @maintenance {
        internal;
        ssi off;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Retry-After "900" always;
        default_type text/html;
        try_files /maintenance.html =503;
    }

    # На случай если страница не найдена / edge только что стартанул
    error_page 500 502 503 504 /maintenance.html;
}
