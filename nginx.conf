# =====================================================================
# 1. Основной сайт: unvrsm.ru / www.unvrsm.ru — раздача SPA-статики
# =====================================================================
server {
    listen 80;
    server_name unvrsm.ru www.unvrsm.ru _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Кэш для иммутабельных ассетов Vite (хэш в имени файла)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # robots.txt, sitemap.xml, статические файлы
    location ~* \.(?:ico|gif|jpe?g|png|webp|svg|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # SPA-роутинг: всё неизвестное отдаём в index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html не кэшируем — нужны свежие хэши ассетов
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Безопасность
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}

# =====================================================================
# 2. Reverse-proxy: api.unvrsm.ru → Supabase
#    Нужен для обхода блокировок Cloudflare/Supabase в РФ.
#    Браузер ходит на российский домен, nginx сервер-сервер дёргает
#    *.supabase.co (исходящие соединения не блокируются РКН).
# =====================================================================

# Upstream — резолвим хост Supabase через публичный DNS,
# чтобы переезд IP на стороне Supabase не ломал прокси.
resolver 8.8.8.8 1.1.1.1 ipv6=off valid=300s;
resolver_timeout 10s;

# Карта для корректного Upgrade-заголовка (WebSocket для Realtime)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name api.unvrsm.ru;

    # SSL терминируется Timeweb перед контейнером — здесь только внутренний 8080.

    # Размер запроса (storage uploads, аватары, документы)
    client_max_body_size 50m;
    client_body_buffer_size 1m;

    # Длинные таймауты для Edge Functions и Realtime
    proxy_connect_timeout 30s;
    proxy_send_timeout    300s;
    proxy_read_timeout    300s;
    send_timeout          300s;

    # ---------- CORS ----------
    # Браузер шлёт preflight OPTIONS — отвечаем сразу, не проксируя.
    set $cors_origin "";
    if ($http_origin ~* ^https?://(localhost(:[0-9]+)?|(www\.)?unvrsm\.ru|.*\.lovable\.app|.*\.lovable\.dev)$) {
        set $cors_origin $http_origin;
    }

    # CORS headers applied on every response (incl. 204 preflight)
    add_header Access-Control-Allow-Origin      "$cors_origin" always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers     "authorization, apikey, content-type, x-client-info, x-supabase-api-version, range, prefer, accept-profile, content-profile, x-requested-with" always;
    add_header Access-Control-Expose-Headers    "content-range, content-length, x-total-count" always;
    add_header Access-Control-Max-Age           "86400" always;

    if ($request_method = OPTIONS) {
        return 204;
    }

    # ---------- Проксирование всех путей в Supabase ----------
    # /auth/*, /rest/*, /storage/*, /functions/*, /realtime/*, /graphql/*
    location / {
        # Переменная вместо литерала — заставляет nginx использовать resolver
        set $supabase_upstream "oxyjmeslnmhewlpgzlmf.supabase.co";

        proxy_pass https://$supabase_upstream$request_uri;

        # SNI и Host — обязательны, иначе Supabase отдаст 526/404
        proxy_ssl_server_name on;
        proxy_ssl_name        $supabase_upstream;
        proxy_set_header      Host $supabase_upstream;

        # Проброс клиентских данных
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # Сохраняем auth-заголовки (apikey, Authorization уже идут by default,
        # но явно указываем — на случай если кто-то их затрёт)
        proxy_pass_request_headers on;

        # WebSocket для Supabase Realtime (/realtime/v1/websocket)
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Отключаем буферизацию для стриминга (Realtime, SSE)
        proxy_buffering off;
        proxy_request_buffering off;

        # CORS-заголовки на ответы
        add_header Access-Control-Allow-Origin      "$cors_origin" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Expose-Headers    "content-range, content-length, x-total-count" always;

        # Не кэшируем API
        add_header Cache-Control "no-store" always;
    }
}
